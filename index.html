<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zynexa Apps</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- LOADING -->
<div id="loading">
    <div class="loader-box">
        <h1>ZYNEXA</h1>
        <div class="bar">
            <div id="progress"></div>
        </div>
        <p id="percent">0%</p>
    </div>
</div>

<!-- SITE -->
<header>
    <h1>ZYNEXA APPS</h1>
    <p>Os melhores apps premium em um só lugar</p>
</header>

<section class="apps" id="apps-container">
</section>

<!-- MODAL -->
<div class="modal" id="modal">
    <div class="modal-box">
        <h2>Finalizar Compra</h2>
        <input type="text" id="nome" placeholder="Seu nome">
        <input type="text" id="numero" placeholder="Seu WhatsApp">
        <button onclick="enviar()">Finalizar no WhatsApp</button>
    </div>
</div>

<div id="toast"></div>

<script src="script.js"></script>
</body>
</html>
